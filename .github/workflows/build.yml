name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS
        id: build
        run: |
          eas build --platform android --profile preview --non-interactive --json > build-output.json
          echo "build_url=$(jq -r '.[0].artifacts.buildUrl' build-output.json)" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o dashpod.apk "${{ steps.build.outputs.build_url }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: dashpod.apk
          make_latest: true
